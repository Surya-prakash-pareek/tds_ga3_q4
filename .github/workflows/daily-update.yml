name: Daily Update by 22f2001613@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'  # Daily at 10 PM UTC
  workflow_dispatch:

permissions:
  contents: write  # Required for push[web:13]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false  # Prevents auth conflict[web:24]

      - name: Update by 22f2001613@ds.study.iitm.ac.in
        run: |
          git config user.name "DevSync Bot"
          git config user.email "22f2001613@ds.study.iitm.ac.in"
          git config --local --unset-all "http.https://github.com/.extraheader"  # Clears conflicting header[web:21]
          echo "$(date): Daily auto-update ran!" >> status.log
          git add status.log
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily update: $(date +%Y-%m-%d)"
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/Surya-prakash-pareek/tds_ga3_q4.git HEAD:main
          fi
