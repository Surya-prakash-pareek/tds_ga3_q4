name: Daily Update by 22f2001613@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'  # Runs daily at 10 PM UTC (specific time: 22:00, not wildcard)
  workflow_dispatch:      # Lets you test manually

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update by 22f2001613@ds.study.iitm.ac.in
        run: |
          echo "$(date): Daily auto-update ran!" >> status.log
          git config user.name "DevSync Bot"
          git config user.email "22f2001613@ds.study.iitm.ac.in"
          git add status.log
          git diff --staged --quiet || git commit -m "Daily update: $(date +%Y-%m-%d)"
          git push
