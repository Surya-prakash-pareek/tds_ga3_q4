name: Daily Update by 22f2001613@ds.study.iitm.ac.in

on:
  schedule:
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          persist-credentials: false

      - name: Update by 22f2001613@ds.study.iitm.ac.in
        run: |
          echo "$(date): Daily update #$(date +%s)" >> status.log
          git config user.name "DevSync Bot"
          git config user.email "22f2001613@ds.study.iitm.ac.in"
          
          # Clear any auth conflicts
          git config --unset-all http.https://github.com/.extraheader || true
          
          git add status.log
          git commit -m "Daily update: $(date +%Y-%m-%d)"
          git push
